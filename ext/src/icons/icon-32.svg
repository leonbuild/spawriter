<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect x="0" y="0" width="32" height="32" rx="3.84" ry="3.84" fill="#1a1a2e"/>
  
  <!-- Eye shape (almond) using two arcs -->
  <path d="M 2.5600000000000005 16 Q 16 1.92, 29.439999999999998 16 Q 16 30.08, 2.5600000000000005 16 Z" 
        fill="#E3F2FD" />
  
  <!-- Upper eyelid line -->
  <path d="M 2.5600000000000005 16 Q 16 1.92, 29.439999999999998 16" 
        fill="none" stroke="#90CAF9" stroke-width="0.64" />
  
  <!-- Lower eyelid line -->
  <path d="M 2.5600000000000005 16 Q 16 30.08, 29.439999999999998 16" 
        fill="none" stroke="#90CAF9" stroke-width="0.64" />
  
  <!-- Iris circle -->
  <circle cx="16" cy="16" r="5.12" fill="#42A5F5" />
  
  <!-- Pupil circle -->
  <circle cx="16" cy="16" r="2.88" fill="#0D47A1" />
  
  <!-- S letter in pupil -->
  <text x="16" y="17.337600000000002" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" 
        font-size="3.52" 
        fill="#E3F2FD">S</text>
  
  <!-- Highlight/glint on iris -->
  <circle cx="14.208" cy="14.208" r="0.96" fill="rgba(255,255,255,0.7)" />
</svg>